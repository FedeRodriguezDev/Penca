name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-aws-eb-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        id: awscreds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::703671898103:role/GitHubActions-Penca-Deploy
          aws-region: ${{ secrets.AWS_REGION }}
          output-credentials: true

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate EB environment config
        env:
          SMTP_PASS:      ${{ secrets.SMTP_PASS }}
          APP_BASE_URL:   ${{ vars.APP_BASE_URL }}
          SMTP_HOST:      ${{ vars.SMTP_HOST }}
          SMTP_PORT:      ${{ vars.SMTP_PORT }}
          SMTP_SECURE:    ${{ vars.SMTP_SECURE }}
          SMTP_USER:      ${{ vars.SMTP_USER }}
          EMAIL_FROM:     ${{ vars.EMAIL_FROM }}
          EMAIL_REPLY_TO: ${{ vars.EMAIL_REPLY_TO }}
          JWT_SECRET:      ${{ secrets.JWT_SECRET }}
        run: |
          mkdir -p .ebextensions
          jq -n \
            --arg smtp_pass      "$SMTP_PASS"      \
            --arg app_base_url   "$APP_BASE_URL"   \
            --arg smtp_host      "$SMTP_HOST"      \
            --arg smtp_port      "$SMTP_PORT"      \
            --arg smtp_secure    "$SMTP_SECURE"    \
            --arg smtp_user      "$SMTP_USER"      \
            --arg email_from     "$EMAIL_FROM"     \
            --arg email_reply_to "$EMAIL_REPLY_TO" \
            --arg jwt_secret     "$JWT_SECRET"     \
            '{
              option_settings: [
                {namespace:"aws:elasticbeanstalk:application:environment",option_name:"SMTP_HOST",      value:$smtp_host},
                {namespace:"aws:elasticbeanstalk:application:environment",option_name:"SMTP_PORT",      value:$smtp_port},
                {namespace:"aws:elasticbeanstalk:application:environment",option_name:"SMTP_SECURE",    value:$smtp_secure},
                {namespace:"aws:elasticbeanstalk:application:environment",option_name:"SMTP_USER",      value:$smtp_user},
                {namespace:"aws:elasticbeanstalk:application:environment",option_name:"SMTP_PASS",      value:$smtp_pass},
                {namespace:"aws:elasticbeanstalk:application:environment",option_name:"EMAIL_FROM",     value:$email_from},
                {namespace:"aws:elasticbeanstalk:application:environment",option_name:"EMAIL_REPLY_TO", value:$email_reply_to},
                {namespace:"aws:elasticbeanstalk:application:environment",option_name:"APP_BASE_URL",   value:$app_base_url},
                {namespace:"aws:elasticbeanstalk:application:environment",option_name:"JWT_SECRET",     value:$jwt_secret},
                {namespace:"aws:elasticbeanstalk:environment",            option_name:"EnvironmentType", value:"SingleInstance"},                                        
                {namespace:"aws:elasticbeanstalk:environment",            option_name:"LoadBalancerType",value:"application"},                                           
                {namespace:"aws:autoscaling:launchconfiguration",         option_name:"InstanceType",    value:"t4g.micro"}                                              
              ]                                                                                    
            }' > .ebextensions/01_environment.config

      - name: Create deployment package
        run: |
          zip -r deploy.zip . \
            -x "*.git*" \
            -x "node_modules/*" \
            -x ".github/*"

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ steps.awscreds.outputs.aws-access-key-id }}
          aws_secret_key: ${{ steps.awscreds.outputs.aws-secret-access-key }}
          aws_session_token: ${{ steps.awscreds.outputs.aws-session-token }}
          application_name: ${{ secrets.AWS_EB_APPLICATION }}
          environment_name: ${{ secrets.AWS_EB_ENVIRONMENT }}
          region: ${{ secrets.AWS_REGION }}
          existing_bucket_name: ${{ secrets.AWS_EB_S3_BUCKET }}
          version_label: ${{ steps.vars.outputs.version_label }}
          deployment_package: deploy.zip
          use_existing_version_if_available: true
          wait_for_deployment: true
