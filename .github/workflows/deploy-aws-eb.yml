name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-aws-eb-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        id: awscreds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::703671898103:role/GitHubActions-Penca-Deploy
          aws-region: ${{ secrets.AWS_REGION }}
          output-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build version label
        id: vars
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          TIMESTAMP=$(date +%s)
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "version_label=gha-${TIMESTAMP}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Create deployment package
        run: |
          zip -r deploy.zip . \
            -x "*.git*" \
            -x "node_modules/*" \
            -x ".github/*"

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ steps.awscreds.outputs.aws-access-key-id }}
          aws_secret_key: ${{ steps.awscreds.outputs.aws-secret-access-key }}
          aws_session_token: ${{ steps.awscreds.outputs.aws-session-token }}
          application_name: ${{ secrets.AWS_EB_APPLICATION }}
          environment_name: ${{ secrets.AWS_EB_ENVIRONMENT }}
          region: ${{ secrets.AWS_REGION }}
          existing_bucket_name: ${{ secrets.AWS_EB_S3_BUCKET }}
          version_label: ${{ steps.vars.outputs.version_label }}
          deployment_package: deploy.zip
          use_existing_version_if_available: true
          wait_for_deployment: true
